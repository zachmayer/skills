name: Update Dependencies
on:
  workflow_dispatch:
  schedule:
  - cron:  '0 10 * * 1'  # every monday at 10 AM

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dep:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Install latest uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: get latest uv version
      id: latest-uv
      run: |
        echo "uv_version=$(uv self version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')" >> "$GITHUB_OUTPUT"

    - name: Install Dependencies
      run: make install-ci

    - name: Run Upgrades
      run: make upgrade

    - name: upgrade UV_VERSION file
      run: |
        echo ${{ steps.latest-uv.outputs.uv_version }} > UV_VERSION

    - name: safe lint
      run: make lint
      continue-on-error: true

    - name: Create Pull Request
      id: create-pr
      uses: peter-evans/create-pull-request@v8
      with:
        token: ${{ secrets.UPDATER_PAT }}
        commit-message: "Weekly: update pre-commit hooks, UV, and lockfile"
        title: "Weekly: update pre-commit hooks, UV, and lockfile"
        branch: update-dependencies
        assignees: zachmayer
        body: |
          Weekly automated sweep: `uv lock --upgrade`, `pre-commit autoupdate`, UV version bump.

          Auto-generated by the [updater workflow](https://github.com/zachmayer/skills/actions/workflows/updater.yaml).

    - name: Auto-merge
      if: steps.create-pr.outputs.pull-request-number
      run: gh pr merge --auto --squash "$PR_URL"
      env:
        PR_URL: ${{ steps.create-pr.outputs.pull-request-url }}
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
