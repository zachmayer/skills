name: Update Dependencies
on:
  workflow_dispatch:
  schedule:
  - cron:  '0 10 * * 1'  # every monday at 10:00 UTC (6 AM EDT)

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dep:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Install latest uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: get latest uv version
      id: latest-uv
      run: |
        echo "uv_version=$(uv self version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')" >> "$GITHUB_OUTPUT"

    - name: Install Dependencies
      run: make install-ci

    - name: Run Upgrades
      run: make upgrade

    - name: upgrade UV_VERSION file
      run: |
        echo ${{ steps.latest-uv.outputs.uv_version }} > UV_VERSION

    - name: safe lint
      run: make lint
      continue-on-error: true

    - name: Validate UPDATER_PAT permissions
      env:
        GH_TOKEN: ${{ secrets.UPDATER_PAT }}
      run: |
        echo "Testing UPDATER_PAT can write to this repo..."
        REPO="${{ github.repository }}"
        SHA=$(gh api "repos/$REPO/git/ref/heads/main" --jq '.object.sha')
        HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
          -X POST \
          -H "Authorization: Bearer ${{ secrets.UPDATER_PAT }}" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/$REPO/git/refs" \
          -d "{\"ref\":\"refs/heads/_updater-pat-test\",\"sha\":\"$SHA\"}")
        if [ "$HTTP" = "201" ]; then
          curl -s -X DELETE \
            -H "Authorization: Bearer ${{ secrets.UPDATER_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/git/refs/heads/_updater-pat-test" > /dev/null
          echo "UPDATER_PAT validated: Contents write confirmed."
        else
          echo "::error::UPDATER_PAT cannot push (HTTP $HTTP). Go to GitHub Settings > Developer settings > Fine-grained tokens > skills-updater > set Contents to 'Read and write'."
          exit 1
        fi

    - name: Create Pull Request
      id: create-pr
      uses: peter-evans/create-pull-request@v8
      with:
        token: ${{ secrets.UPDATER_PAT }}
        commit-message: "Weekly: update pre-commit hooks, UV, and lockfile"
        title: "Weekly: update pre-commit hooks, UV, and lockfile"
        branch: update-dependencies
        assignees: zachmayer
        body: |
          Weekly automated sweep: `uv lock --upgrade`, `pre-commit autoupdate`, UV version bump.

          Auto-generated by the [updater workflow](https://github.com/zachmayer/skills/actions/workflows/updater.yaml).

    - name: Auto-merge
      if: steps.create-pr.outputs.pull-request-operation == 'created'
      run: gh pr merge --auto --squash "$PR_URL"
      env:
        PR_URL: ${{ steps.create-pr.outputs.pull-request-url }}
        GH_TOKEN: ${{ secrets.UPDATER_PAT }}
