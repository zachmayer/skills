name: Update Dependencies
on:
  workflow_dispatch:
  schedule:
  - cron:  '0 10 * * 1'  # every monday at 10 AM

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dep:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install latest uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: get latest uv version
      id: latest-uv
      run: |
        echo "uv_version=$(uv self version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')" >> "$GITHUB_OUTPUT"

    - name: Install Dependencies
      run: make install-ci

    - name: Run Upgrades
      run: make upgrade

    - name: upgrade UV_VERSION file
      run: |
        echo ${{ steps.latest-uv.outputs.uv_version }} > UV_VERSION

    - name: safe lint
      run: make lint
      continue-on-error: true

    - name: Create Pull Request
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if git diff --quiet; then
          echo "No changes to commit"
          exit 0
        fi
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git checkout -b update-dependencies
        git add -A
        git commit -m "Update dependencies"
        git push -f origin update-dependencies
        if gh pr list --head update-dependencies --state open --json number --jq '.[0].number' | grep -q .; then
          echo "PR already exists"
        else
          gh pr create \
            --title "Update dependencies" \
            --body "Dependency updates. Auto-generated by the updater workflow." \
            --head update-dependencies \
            --base main \
            --assignee zachmayer
        fi
